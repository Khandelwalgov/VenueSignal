name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -r requirements-production.txt -r requirements.txt
          pip install pip-audit
          pip check
          pip-audit -r requirements-production.txt
      - name: Verify production Google SDK imports
        run: |
          cd apps/api
          python -c "from google import genai; import firebase_admin; from google.cloud import firestore"
      - name: Run backend tests
        run: |
          cd apps/api
          python -m pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'
      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
      - name: Lint
        run: |
          cd apps/web
          npm run lint
      - name: Unit tests
        run: |
          cd apps/web
          npm test -- --run
      - name: Typecheck
        run: |
          cd apps/web
          npm run typecheck
      - name: Build
        run: |
          cd apps/web
          npm run build
      - name: Production dependency audit
        run: |
          cd apps/web
          npm audit --omit=dev

  repo-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repository size
        run: |
          python scripts/check_repo_size.py
